<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NexChat</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Mulish:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
/*──────────────────────────────────────────────
  RESET & VARIABLES
──────────────────────────────────────────────*/
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080a10;
  --s1:#0f1220;
  --s2:#161b2e;
  --s3:#1e2440;
  --border:#252d4a;
  --border2:#2e3860;
  --acc:#00e5ff;
  --acc2:#7b5ea7;
  --acc-dim:rgba(0,229,255,.10);
  --acc-glow:rgba(0,229,255,.30);
  --green:#00e676;
  --red:#ff4d6d;
  --yellow:#ffd60a;
  --text:#dde3f5;
  --text2:#8892b0;
  --text3:#4a5578;
  --r:14px;
  --rs:8px;
  --sidebar:300px;
}
html,body{height:100%;overflow:hidden}
body{font-family:'Mulish',sans-serif;background:var(--bg);color:var(--text);display:flex}

/* scrollbar */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}

/*──────────────────────────────────────────────
  SETUP SCREEN
──────────────────────────────────────────────*/
#setup-screen{
  position:fixed;inset:0;z-index:200;
  background:var(--bg);
  display:flex;align-items:center;justify-content:center;
  transition:opacity .4s,visibility .4s;
}
#setup-screen.gone{opacity:0;visibility:hidden;pointer-events:none}

.setup-card{
  background:var(--s1);
  border:1px solid var(--border);
  border-radius:24px;
  padding:40px 36px;
  width:420px;
  max-height:90vh;
  overflow-y:auto;
  box-shadow:0 0 80px rgba(0,229,255,.06),0 32px 64px rgba(0,0,0,.5);
  animation:popIn .5s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes popIn{from{opacity:0;transform:scale(.9) translateY(20px)}to{opacity:1;transform:none}}

.setup-logo{
  font-family:'Syne',sans-serif;
  font-size:30px;font-weight:800;
  background:linear-gradient(135deg,var(--acc),var(--acc2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  margin-bottom:4px;
}
.setup-sub{font-size:13px;color:var(--text2);margin-bottom:28px}

/* avatar picker */
.avatar-picker{display:flex;flex-direction:column;align-items:center;gap:10px;margin-bottom:24px}
.avatar-ring{
  width:90px;height:90px;border-radius:50%;
  border:2px dashed var(--border2);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;overflow:hidden;
  transition:border-color .2s;position:relative;
  background:var(--s2);
}
.avatar-ring:hover{border-color:var(--acc)}
.avatar-ring img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.avatar-ring .av-placeholder{font-size:32px;color:var(--text3)}
.avatar-ring .av-overlay{
  position:absolute;inset:0;background:rgba(0,0,0,.5);
  display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity .2s;font-size:20px;border-radius:50%;
}
.avatar-ring:hover .av-overlay{opacity:1}
.avatar-hint{font-size:11px;color:var(--text3)}

/* color picker row */
.color-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.color-dot{
  width:22px;height:22px;border-radius:50%;cursor:pointer;
  border:2px solid transparent;transition:transform .15s,border-color .15s;
}
.color-dot:hover{transform:scale(1.2)}
.color-dot.active{border-color:#fff;transform:scale(1.15)}

/* form fields */
.field-group{margin-bottom:14px}
.field-group label{
  display:block;font-size:10px;font-weight:700;
  letter-spacing:1.2px;text-transform:uppercase;
  color:var(--text3);margin-bottom:6px;
}
.field-group input,.field-group textarea,.field-group select{
  width:100%;padding:11px 14px;
  background:var(--s2);border:1px solid var(--border);
  border-radius:var(--rs);color:var(--text);
  font-family:'Mulish',sans-serif;font-size:14px;
  outline:none;transition:border-color .2s,box-shadow .2s;resize:none;
}
.field-group input::placeholder,.field-group textarea::placeholder{color:var(--text3)}
.field-group input:focus,.field-group textarea:focus{
  border-color:var(--acc);box-shadow:0 0 0 3px var(--acc-dim);
}
.phone-row{display:flex;gap:8px;align-items:flex-end}
.phone-row .field-group{flex:1;margin-bottom:0}
.toggle-vis{
  white-space:nowrap;padding:11px 12px;
  background:var(--s2);border:1px solid var(--border);
  border-radius:var(--rs);color:var(--text2);
  font-size:12px;cursor:pointer;transition:all .2s;
}
.toggle-vis:hover{border-color:var(--acc);color:var(--acc)}
.toggle-vis.on{background:var(--acc-dim);border-color:var(--acc);color:var(--acc)}

.btn-primary{
  width:100%;padding:13px;margin-top:8px;
  background:linear-gradient(135deg,var(--acc),#0099bb);
  color:#080a10;font-family:'Mulish',sans-serif;
  font-size:15px;font-weight:700;
  border:none;border-radius:var(--rs);cursor:pointer;
  transition:transform .15s,box-shadow .2s;letter-spacing:.3px;
}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 8px 24px var(--acc-glow)}
.btn-primary:active{transform:scale(.98)}

/*──────────────────────────────────────────────
  APP LAYOUT
──────────────────────────────────────────────*/
#app{display:flex;width:100%;height:100vh;overflow:hidden}

/*──────────────────────────────────────────────
  LEFT SIDEBAR
──────────────────────────────────────────────*/
#sidebar{
  width:var(--sidebar);flex-shrink:0;
  background:var(--s1);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  overflow:hidden;
}

.sidebar-header{
  padding:16px 18px 12px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
}
.app-name{
  font-family:'Syne',sans-serif;font-size:20px;font-weight:800;
  background:linear-gradient(135deg,var(--acc),var(--acc2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.online-pill{
  display:flex;align-items:center;gap:5px;
  background:rgba(0,230,118,.1);border:1px solid rgba(0,230,118,.25);
  border-radius:20px;padding:3px 9px;font-size:11px;color:var(--green);font-weight:600;
}
.online-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:blink 2s ease infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* my mini profile */
.my-profile-bar{
  padding:12px 16px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;cursor:pointer;
  transition:background .15s;flex-shrink:0;
}
.my-profile-bar:hover{background:var(--s2)}
.my-profile-bar .av{width:38px;height:38px;border-radius:50%;object-fit:cover;flex-shrink:0}
.my-profile-bar .av-letter{
  width:38px;height:38px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-family:'Syne',sans-serif;font-size:14px;font-weight:700;flex-shrink:0;
}
.my-name{font-size:13px;font-weight:600;color:var(--text)}
.my-status{font-size:11px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px}
.edit-profile-btn{
  margin-left:auto;background:none;border:none;color:var(--text3);
  font-size:15px;cursor:pointer;padding:4px;transition:color .2s;
}
.edit-profile-btn:hover{color:var(--acc)}

/* tabs */
.sidebar-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.tab-btn{
  flex:1;padding:10px 0;background:none;border:none;color:var(--text2);
  font-family:'Mulish',sans-serif;font-size:12px;font-weight:600;
  cursor:pointer;border-bottom:2px solid transparent;
  transition:color .2s,border-color .2s;letter-spacing:.5px;text-transform:uppercase;
}
.tab-btn.active{color:var(--acc);border-bottom-color:var(--acc)}

/* user list */
#user-list-panel,#dm-list-panel{
  flex:1;overflow-y:auto;padding:8px 0;
}
.panel{display:none}
.panel.active{display:block}

.user-item{
  display:flex;align-items:center;gap:10px;
  padding:9px 16px;cursor:pointer;
  transition:background .15s;position:relative;
}
.user-item:hover{background:var(--s2)}
.user-item.active-dm{background:var(--s2);border-left:3px solid var(--acc)}

.user-av{width:36px;height:36px;border-radius:50%;object-fit:cover;flex-shrink:0}
.user-av-letter{
  width:36px;height:36px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-family:'Syne',sans-serif;font-size:13px;font-weight:700;flex-shrink:0;
}
.user-info{flex:1;min-width:0}
.user-name{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-status-txt{font-size:11px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.unread-badge{
  background:var(--acc);color:#080a10;
  border-radius:10px;padding:2px 7px;font-size:10px;font-weight:700;
  flex-shrink:0;
}

/*──────────────────────────────────────────────
  MAIN CHAT AREA
──────────────────────────────────────────────*/
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}

.chat-topbar{
  padding:12px 20px;
  border-bottom:1px solid var(--border);
  background:var(--s1);
  display:flex;align-items:center;gap:12px;
  flex-shrink:0;
}
.chat-topbar .av{width:36px;height:36px;border-radius:50%;object-fit:cover;flex-shrink:0}
.chat-topbar .av-letter{
  width:36px;height:36px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-family:'Syne',sans-serif;font-size:14px;font-weight:700;
}
.topbar-info{flex:1}
.topbar-name{font-family:'Syne',sans-serif;font-size:15px;font-weight:700}
.topbar-sub{font-size:11px;color:var(--text2)}
.topbar-actions{display:flex;gap:8px}
.topbar-btn{
  background:none;border:none;color:var(--text2);
  font-size:17px;cursor:pointer;padding:6px;border-radius:var(--rs);
  transition:all .2s;
}
.topbar-btn:hover{background:var(--s2);color:var(--acc)}

/* messages */
#messages-wrap{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:2px}

.date-divider{
  display:flex;align-items:center;gap:10px;margin:14px 0;
}
.date-divider::before,.date-divider::after{content:'';flex:1;height:1px;background:var(--border)}
.date-divider span{font-size:10px;color:var(--text3);letter-spacing:.8px;text-transform:uppercase;font-family:'Syne',sans-serif}

.sys-msg{text-align:center;font-size:11px;color:var(--text3);padding:5px 0;font-style:italic}

.msg-row{
  display:flex;gap:8px;max-width:78%;
  animation:msgSlide .22s ease both;
}
@keyframes msgSlide{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.msg-row.own{align-self:flex-end;flex-direction:row-reverse}
.msg-row.other{align-self:flex-start}

.msg-av{width:30px;height:30px;border-radius:50%;object-fit:cover;flex-shrink:0;margin-top:2px;cursor:pointer}
.msg-av-letter{
  width:30px;height:30px;border-radius:50%;flex-shrink:0;margin-top:2px;
  display:flex;align-items:center;justify-content:center;
  font-family:'Syne',sans-serif;font-size:11px;font-weight:700;cursor:pointer;
}

.msg-body{display:flex;flex-direction:column;gap:2px;max-width:100%}
.msg-meta{display:flex;align-items:center;gap:6px;padding:0 4px;font-size:10px;color:var(--text3)}
.msg-row.own .msg-meta{flex-direction:row-reverse}
.msg-sender{font-weight:700;font-size:11px}

.bubble{
  padding:9px 13px;border-radius:16px;
  font-size:14px;line-height:1.55;word-break:break-word;
  position:relative;
}
.msg-row.other .bubble{
  background:var(--s2);border:1px solid var(--border);
  border-top-left-radius:4px;
}
.msg-row.own .bubble{
  background:linear-gradient(135deg,#006e7a,#004e5c);
  border:1px solid rgba(0,229,255,.2);
  border-top-right-radius:4px;color:#e0f7fa;
}

/* image bubble */
.bubble.img-bubble{padding:6px;cursor:pointer}
.bubble.img-bubble img{
  max-width:220px;max-height:200px;
  border-radius:10px;display:block;object-fit:cover;
}
.img-caption{font-size:12px;padding:4px 2px 0;color:var(--text2)}

/* location bubble */
.bubble.loc-bubble{display:flex;align-items:center;gap:8px;padding:10px 13px}
.bubble.loc-bubble a{color:var(--acc);font-size:13px;font-weight:500;text-decoration:none}
.bubble.loc-bubble a:hover{text-decoration:underline}

/* reactions */
.reactions{display:flex;flex-wrap:wrap;gap:4px;margin-top:3px}
.reaction-chip{
  background:var(--s3);border:1px solid var(--border);
  border-radius:20px;padding:2px 7px;font-size:12px;cursor:pointer;
  transition:background .15s;
}
.reaction-chip:hover{background:var(--border2)}

/* typing */
#typing-bar{height:20px;padding:0 20px;font-size:11px;color:var(--text3);font-style:italic;display:flex;align-items:center;gap:5px;flex-shrink:0}
.t-dots span{display:inline-block;width:3px;height:3px;border-radius:50%;background:var(--text3);animation:td 1.2s ease infinite}
.t-dots span:nth-child(2){animation-delay:.2s}
.t-dots span:nth-child(3){animation-delay:.4s}
@keyframes td{0%,80%,100%{transform:scale(.7);opacity:.4}40%{transform:scale(1);opacity:1}}

/* input bar */
.input-bar{
  padding:10px 16px 14px;
  border-top:1px solid var(--border);
  background:var(--s1);flex-shrink:0;
}
.input-row{display:flex;align-items:center;gap:8px}
.input-actions{display:flex;gap:4px}
.act-btn{
  width:36px;height:36px;border-radius:50%;background:none;
  border:1px solid var(--border);color:var(--text2);
  display:flex;align-items:center;justify-content:center;
  font-size:16px;cursor:pointer;transition:all .2s;flex-shrink:0;
}
.act-btn:hover{border-color:var(--acc);color:var(--acc);background:var(--acc-dim)}
.act-btn.active{border-color:var(--acc);color:var(--acc);background:var(--acc-dim)}

#msg-input{
  flex:1;padding:10px 14px;
  background:var(--s2);border:1px solid var(--border);
  border-radius:24px;color:var(--text);
  font-family:'Mulish',sans-serif;font-size:14px;outline:none;
  transition:border-color .2s,box-shadow .2s;
}
#msg-input::placeholder{color:var(--text3)}
#msg-input:focus{border-color:rgba(0,229,255,.4);box-shadow:0 0 0 3px var(--acc-dim)}

.send-btn{
  width:38px;height:38px;border-radius:50%;
  background:linear-gradient(135deg,var(--acc),#0099bb);
  color:#080a10;border:none;font-size:15px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .2s;flex-shrink:0;
}
.send-btn:hover{box-shadow:0 4px 16px var(--acc-glow);transform:scale(1.08)}

/* emoji picker */
#emoji-picker{
  position:absolute;bottom:72px;left:20px;
  background:var(--s2);border:1px solid var(--border);
  border-radius:var(--r);padding:12px;
  display:none;flex-wrap:wrap;gap:4px;width:280px;
  box-shadow:0 8px 32px rgba(0,0,0,.4);z-index:50;
}
#emoji-picker.open{display:flex}
.e-btn{font-size:20px;cursor:pointer;padding:4px;border-radius:6px;transition:background .15s;line-height:1}
.e-btn:hover{background:var(--s3)}

/* image preview strip */
#img-preview{
  display:none;padding:8px 0 0;
}
#img-preview.show{display:flex;align-items:center;gap:8px}
#img-preview img{width:56px;height:56px;object-fit:cover;border-radius:8px;border:1px solid var(--border)}
.remove-img{background:var(--red);color:#fff;border:none;border-radius:50%;width:18px;height:18px;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center}

/*──────────────────────────────────────────────
  PROFILE PANEL (right side)
──────────────────────────────────────────────*/
#profile-panel{
  width:280px;flex-shrink:0;
  background:var(--s1);border-left:1px solid var(--border);
  display:none;flex-direction:column;overflow-y:auto;
  animation:slideIn .25s ease;
}
#profile-panel.open{display:flex}
@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:none}}

.pp-header{
  padding:16px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
}
.pp-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--text)}
.pp-close{background:none;border:none;color:var(--text2);font-size:18px;cursor:pointer;padding:2px;transition:color .2s}
.pp-close:hover{color:var(--red)}

.pp-body{padding:20px 16px;display:flex;flex-direction:column;gap:16px}

.pp-avatar{
  width:72px;height:72px;border-radius:50%;object-fit:cover;
  border:2px solid var(--border2);display:block;margin:0 auto;
}
.pp-avatar-letter{
  width:72px;height:72px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-family:'Syne',sans-serif;font-size:26px;font-weight:700;
  border:2px solid var(--border2);margin:0 auto;
}
.pp-name{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;text-align:center;color:var(--text)}
.pp-username{font-size:12px;color:var(--text3);text-align:center}

.pp-section{background:var(--s2);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px}
.pp-section h4{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text3);margin-bottom:8px}
.pp-row{display:flex;align-items:flex-start;gap:8px;padding:4px 0;font-size:13px}
.pp-row .icon{font-size:14px;margin-top:1px;flex-shrink:0}
.pp-row .val{color:var(--text2);word-break:break-word}
.pp-row .val.hidden-val{color:var(--text3);font-style:italic}

.dm-btn{
  width:100%;padding:10px;
  background:var(--acc-dim);border:1px solid var(--acc);
  color:var(--acc);border-radius:var(--rs);
  font-family:'Mulish',sans-serif;font-size:13px;font-weight:600;
  cursor:pointer;transition:all .2s;
}
.dm-btn:hover{background:var(--acc);color:#080a10}

/*──────────────────────────────────────────────
  MODAL OVERLAY (edit profile / view image)
──────────────────────────────────────────────*/
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.7);
  z-index:300;display:flex;align-items:center;justify-content:center;
  opacity:0;visibility:hidden;transition:opacity .2s,visibility .2s;
}
.modal-overlay.open{opacity:1;visibility:visible}

.modal-card{
  background:var(--s1);border:1px solid var(--border);border-radius:20px;
  padding:28px 28px 24px;width:420px;max-height:85vh;overflow-y:auto;
  box-shadow:0 24px 64px rgba(0,0,0,.5);
  animation:popIn .25s ease both;
}
.modal-title{
  font-family:'Syne',sans-serif;font-size:17px;font-weight:700;
  margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;
}
.modal-close{background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer;line-height:1;transition:color .2s}
.modal-close:hover{color:var(--red)}

/* image lightbox */
#lightbox-img{max-width:90vw;max-height:85vh;border-radius:12px;display:block}

/*──────────────────────────────────────────────
  TOAST
──────────────────────────────────────────────*/
#toast{
  position:fixed;bottom:28px;left:50%;
  transform:translateX(-50%) translateY(16px);
  background:var(--s2);border:1px solid var(--border2);
  border-radius:30px;padding:9px 20px;font-size:13px;color:var(--text2);
  opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;z-index:500;white-space:nowrap;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* empty state */
.empty-chat{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  color:var(--text3);gap:10px;
}
.empty-chat .big-icon{font-size:48px;opacity:.4}
.empty-chat p{font-size:14px}
</style>
</head>
<body>

<!--══════════════════════════════════════════
  SETUP SCREEN
══════════════════════════════════════════-->
<div id="setup-screen">
<div class="setup-card">
  <div class="setup-logo">NexChat</div>
  <p class="setup-sub">Set up your profile to get started</p>

  <!-- Avatar -->
  <div class="avatar-picker">
    <div class="avatar-ring" id="av-ring" onclick="document.getElementById('av-file').click()">
      <span class="av-placeholder">👤</span>
      <div class="av-overlay">📷</div>
    </div>
    <span class="avatar-hint">Click to upload profile photo</span>
    <input type="file" id="av-file" accept="image/*" style="display:none"/>
  </div>

  <!-- Color -->
  <div class="field-group">
    <label>Profile colour</label>
    <div class="color-row" id="color-row"></div>
  </div>

<!--══════════════════════════════════════════
  IMAGE LIGHTBOX MODAL
══════════════════════════════════════════-->
<div class="modal-overlay" id="lightbox-modal" onclick="closeModal('lightbox-modal')">
  <img id="lightbox-img" src="" alt=""/>
</div>

<!-- Toast -->
<div id="toast"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
/*════════════════════════════════════════════
  STATE
════════════════════════════════════════════*/
const socket = io();
let me = null;              // my profile
let allUsers = {};          // socketId -> user obj
let currentMode = 'global'; // 'global' | 'dm'
let currentDmUser = null;   // socketId
let dmHistory = {};         // socketId -> [messages]
let globalMessages = [];
let unreadDms = {};         // socketId -> count
let phoneVisible = true;
let editPhoneVisible = true;
let pendingImageData = null;
let typingTimers = {};
let globalTypers = {};
let dmTypers = {};

/*════════════════════════════════════════════
  COLOURS & EMOJIS
════════════════════════════════════════════*/
const PALETTE = ['#00e5ff','#7b5ea7','#00e676','#ff4d6d','#ffd60a','#ff9f43','#a78bfa','#fb7185'];
const EMOJIS  = ['😀','😂','😍','🥺','😎','🤔','👍','❤️','🔥','✨','🎉','😭','🙏','💯','🤩','😏',
                 '👏','🥳','😴','🤣','💪','🎯','🚀','⭐','💎','🌟','😊','🤝','👋','🫡'];

// Build colour picker
const colRow = document.getElementById('color-row');
PALETTE.forEach((c,i)=>{
  const d=document.createElement('div');
  d.className='color-dot'+(i===0?' active':'');
  d.style.background=c;
  d.dataset.color=c;
  d.onclick=()=>{document.querySelectorAll('.color-dot').forEach(x=>x.classList.remove('active'));d.classList.add('active')};
  colRow.appendChild(d);
});

// Build emoji picker
const epEl = document.getElementById('emoji-picker');
EMOJIS.forEach(em=>{
  const b=document.createElement('span');
  b.className='e-btn';b.textContent=em;
  b.onclick=()=>{
    const inp=document.getElementById('msg-input');
    inp.value+=em;inp.focus();
  };
  epEl.appendChild(b);
});

/*════════════════════════════════════════════
  HELPERS
════════════════════════════════════════════*/
function colorFor(name){
  let h=0;for(let i=0;i<name.length;i++)h=(h*31+name.charCodeAt(i))&0xffffffff;
  return PALETTE[Math.abs(h)%PALETTE.length];
}
function initials(name){return(name||'?').slice(0,2).toUpperCase()}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function timeNow(){return new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}

let toastT;
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('show'),2800);
}

function openModal(id){document.getElementById(id).classList.add('open')}
function closeModal(id){document.getElementById(id).classList.remove('open')}

function makeAvatar(user,size=36,cls=''){
  if(user.avatar){
    return `<img src="${esc(user.avatar)}" class="${cls}" style="width:${size}px;height:${size}px;border-radius:50%;object-fit:cover;flex-shrink:0" alt=""/>`;
  }
  const bg=user.color||colorFor(user.displayName||user.username||'?');
  return `<div class="${cls}" style="width:${size}px;height:${size}px;border-radius:50%;background:${bg}22;color:${bg};border:1.5px solid ${bg}44;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:${Math.round(size*.38)}px;font-weight:700;flex-shrink:0">${initials(user.displayName||user.username)}</div>`;
}

/*════════════════════════════════════════════
  SETUP / JOIN
════════════════════════════════════════════*/
function togglePhoneVis(){
  phoneVisible=!phoneVisible;
  const b=document.getElementById('phone-vis-btn');
  b.textContent=phoneVisible?'👁 Visible':'🙈 Hidden';
  b.classList.toggle('on',phoneVisible);
}
function toggleEditPhoneVis(){
  editPhoneVisible=!editPhoneVisible;
  const b=document.getElementById('e-phone-vis-btn');
  b.textContent=editPhoneVisible?'👁 Visible':'🙈 Hidden';
  b.classList.toggle('on',editPhoneVisible);
}

// Avatar upload on setup
document.getElementById('av-file').addEventListener('change',async e=>{
  const file=e.target.files[0]; if(!file)return;
  const ring=document.getElementById('av-ring');
  const reader=new FileReader();
  reader.onload=ev=>{
    ring.innerHTML=`<img src="${ev.target.result}" style="width:100%;height:100%;object-fit:cover;border-radius:50%"/><div class="av-overlay">📷</div>`;
    ring._dataUrl=ev.target.result;
  };
  reader.readAsDataURL(file);
});

// Avatar upload on edit modal
document.getElementById('edit-av-file').addEventListener('change',e=>{
  const file=e.target.files[0]; if(!file)return;
  const ring=document.getElementById('edit-av-ring');
  const reader=new FileReader();
  reader.onload=ev=>{
    ring.innerHTML=`<img src="${ev.target.result}" style="width:100%;height:100%;object-fit:cover;border-radius:50%"/><div class="av-overlay">📷</div>`;
    ring._dataUrl=ev.target.result;
  };
  reader.readAsDataURL(file);
});

async function joinChat(){
  const dn=document.getElementById('s-displayname').value.trim();
  const un=document.getElementById('s-username').value.trim();
  if(!dn||!un){toast('Display name & username are required');return}

  const color=document.querySelector('.color-dot.active')?.dataset.color||PALETTE[0];
  const ring=document.getElementById('av-ring');
  const avatar=ring._dataUrl||null;

  const profile={
    displayName:dn, username:un,
    status:document.getElementById('s-status').value.trim()||'Hey there! I am using NexChat',
    phone:document.getElementById('s-phone').value.trim(),
    phoneVisible,
    address:document.getElementById('s-address').value.trim(),
    color, avatar,
  };
  socket.emit('join',profile);
  document.getElementById('setup-screen').classList.add('gone');
  document.getElementById('msg-input').focus();
}

document.getElementById('s-username').addEventListener('keydown',e=>{if(e.key==='Enter')joinChat()});

/*════════════════════════════════════════════
  EDIT PROFILE MODAL
════════════════════════════════════════════*/
function openEditProfile(){
  if(!me)return;
  document.getElementById('e-displayname').value=me.displayName||'';
  document.getElementById('e-status').value=me.status||'';
  document.getElementById('e-phone').value=me.phone||'';
  document.getElementById('e-address').value=me.address||'';
  editPhoneVisible=me.phoneVisible!==false;
  const b=document.getElementById('e-phone-vis-btn');
  b.textContent=editPhoneVisible?'👁 Visible':'🙈 Hidden';
  b.classList.toggle('on',editPhoneVisible);
  // show current avatar
  const ring=document.getElementById('edit-av-ring');
  if(me.avatar) ring.innerHTML=`<img src="${me.avatar}" style="width:100%;height:100%;object-fit:cover;border-radius:50%"/><div class="av-overlay">📷</div>`;
  else ring.innerHTML='<span class="av-placeholder">👤</span><div class="av-overlay">📷</div>';
  ring._dataUrl=me.avatar||null;
  openModal('edit-modal');
}

function saveProfile(){
  const dn=document.getElementById('e-displayname').value.trim();
  if(!dn){toast('Display name required');return}
  const ring=document.getElementById('edit-av-ring');
  const updates={
    displayName:dn,
    status:document.getElementById('e-status').value.trim(),
    phone:document.getElementById('e-phone').value.trim(),
    phoneVisible:editPhoneVisible,
    address:document.getElementById('e-address').value.trim(),
    avatar:ring._dataUrl||me.avatar||null,
  };
  socket.emit('update-profile',updates);
  closeModal('edit-modal');
  toast('Profile updated ✓');
}

/*════════════════════════════════════════════
  TABS & CHAT MODE SWITCHING
════════════════════════════════════════════*/
function switchTab(tab){
  document.querySelectorAll('.tab-btn').forEach((b,i)=>{
    b.classList.toggle('active',['global','people','dms'][i]===tab);
  });
  ['global','people','dms'].forEach(t=>{
    document.getElementById(t+'-panel').classList.toggle('active',t===tab);
  });
  if(tab==='global') switchToGlobal();
}

function switchToGlobal(){
  currentMode='global';currentDmUser=null;
  document.getElementById('topbar-name').textContent='Global Chat';
  document.getElementById('topbar-sub').textContent='Everyone online';
  document.getElementById('view-profile-btn').style.display='none';
  document.getElementById('chat-topbar').querySelector('div').textContent='💬';
  closeProfilePanel();
  renderMessages(globalMessages,'global');
}

function switchToDm(socketId){
  currentMode='dm';currentDmUser=socketId;
  const user=allUsers[socketId];if(!user)return;
  document.getElementById('topbar-name').textContent=user.displayName;
  document.getElementById('topbar-sub').textContent='@'+user.username;
  document.getElementById('view-profile-btn').style.display='flex';
  // update topbar avatar
  const topbar=document.getElementById('chat-topbar');
  topbar.firstElementChild.outerHTML=makeAvatar(user,36);
  if(!dmHistory[socketId])dmHistory[socketId]=[];
  unreadDms[socketId]=0;
  renderMessages(dmHistory[socketId],'dm');
  renderDmList();
  renderPeopleList();
  switchTab('dms');
}

/*════════════════════════════════════════════
  USER / DM LISTS
════════════════════════════════════════════*/
function renderPeopleList(){
  const el=document.getElementById('user-list-panel');
  const others=Object.values(allUsers).filter(u=>u.socketId!==socket.id);
  if(!others.length){el.innerHTML='<div style="padding:20px 16px;font-size:12px;color:var(--text3)">No other users online</div>';return}
  el.innerHTML=others.map(u=>`
    <div class="user-item${currentDmUser===u.socketId?' active-dm':''}" onclick="switchToDm('${u.socketId}')">
      ${makeAvatar(u,36,'user-av')}
      <div class="user-info">
        <div class="user-name">${esc(u.displayName)}</div>
        <div class="user-status-txt">${esc(u.status||'')}</div>
      </div>
      ${(unreadDms[u.socketId]||0)>0?`<span class="unread-badge">${unreadDms[u.socketId]}</span>`:''}
    </div>`).join('');
}

function renderDmList(){
  const el=document.getElementById('dm-list-panel');
  const convos=Object.keys(dmHistory).filter(sid=>dmHistory[sid].length>0);
  if(!convos.length){el.innerHTML='<div style="padding:20px 16px;font-size:12px;color:var(--text3)">No DMs yet — click a user in People tab</div>';return}
  el.innerHTML=convos.map(sid=>{
    const u=allUsers[sid];if(!u)return'';
    const last=dmHistory[sid].slice(-1)[0];
    const preview=last?.type==='image'?'📷 Photo':last?.type==='location'?'📍 Location':(last?.text||'');
    return`<div class="user-item${currentDmUser===sid?' active-dm':''}" onclick="switchToDm('${sid}')">
      ${makeAvatar(u,36,'user-av')}
      <div class="user-info">
        <div class="user-name">${esc(u.displayName)}</div>
        <div class="user-status-txt">${esc(preview.slice(0,28))}</div>
      </div>
      ${(unreadDms[sid]||0)>0?`<span class="unread-badge">${unreadDms[sid]}</span>`:''}
    </div>`;
  }).join('');
}

/*════════════════════════════════════════════
  RENDER MESSAGES
════════════════════════════════════════════*/
function renderMessages(msgs,mode){
  const wrap=document.getElementById('messages-wrap');
  wrap.innerHTML='<div class="date-divider"><span>Today</span></div>';
  msgs.forEach(m=>appendMsgEl(m,mode,false));
  wrap.scrollTop=wrap.scrollHeight;
}

function appendMsgEl(msg,mode,scroll=true){
  const wrap=document.getElementById('messages-wrap');
  const isMine= msg.socketId===socket.id || msg.fromSocketId===socket.id;

  if(msg.type==='system'){
    const d=document.createElement('div');d.className='sys-msg';d.textContent=msg.text;
    wrap.appendChild(d);
  } else {
    const row=document.createElement('div');
    row.className='msg-row '+(isMine?'own':'other');
    row.dataset.msgId=msg.id;

    const user=isMine?me:(allUsers[msg.socketId||msg.fromSocketId]||{displayName:msg.displayName,avatar:msg.avatar,color:msg.color,username:msg.displayName});

    const avHtml=user?makeAvatar(user,30,'msg-av'):'<div class="msg-av-letter" style="width:30px;height:30px;border-radius:50%;background:#333">?</div>';
    const avClickable=avHtml.replace('<img ','<img onclick="openProfilePanel(\''+( msg.socketId||msg.fromSocketId)+'\')" ').replace('<div ','<div onclick="openProfilePanel(\''+( msg.socketId||msg.fromSocketId)+'\')" ');

    let bubbleHtml='';
    if(msg.type==='text'){
      bubbleHtml=`<div class="bubble">${esc(msg.text)}</div>`;
    } else if(msg.type==='image'){
      bubbleHtml=`<div class="bubble img-bubble" onclick="openLightbox('${msg.imageData}')"><img src="${msg.imageData}" alt="photo"/>${msg.caption?`<div class="img-caption">${esc(msg.caption)}</div>`:''}</div>`;
    } else if(msg.type==='location'){
      bubbleHtml=`<div class="bubble loc-bubble"><span style="font-size:20px">📍</span><a href="${esc(msg.mapsUrl)}" target="_blank" rel="noopener">${msg.latitude.toFixed(4)}, ${msg.longitude.toFixed(4)}<span style="font-size:10px;opacity:.6"> ↗ Maps</span></a></div>`;
    }

    row.innerHTML=`
      ${avClickable}
      <div class="msg-body">
        <div class="msg-meta">
          <span class="msg-sender" style="color:${user?.color||'var(--acc)'}">${esc(user?.displayName||msg.displayName)}</span>
          <span>${msg.time}</span>
        </div>
        ${bubbleHtml}
        <div class="reactions" id="reactions-${msg.id}"></div>
      </div>`;

    // right-click / long-press for reactions
    row.addEventListener('contextmenu',e=>{e.preventDefault();showReactionMenu(msg.id,e.clientX,e.clientY)});
    wrap.appendChild(row);
  }

  if(scroll)wrap.scrollTop=wrap.scrollHeight;
}

/*════════════════════════════════════════════
  SEND MESSAGE / MEDIA
════════════════════════════════════════════*/
function sendMessage(){
  const text=document.getElementById('msg-input').value.trim();

  // If image pending, send image
  if(pendingImageData){
    const caption=document.getElementById('img-caption').value.trim();
    const payload={imageData:pendingImageData,caption};
    if(currentMode==='dm'&&currentDmUser) socket.emit('private-image',{...payload,toSocketId:currentDmUser});
    else socket.emit('chat-image',payload);
    clearImagePreview();
    return;
  }

  if(!text)return;
  if(currentMode==='dm'&&currentDmUser){
    socket.emit('private-message',{text,toSocketId:currentDmUser});
  } else {
    socket.emit('chat-message',{text});
  }
  document.getElementById('msg-input').value='';
  clearTypingSignal();
}

document.getElementById('msg-input').addEventListener('keydown',e=>{
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage()}
});

// Typing
let tyTimer,isTy=false;
document.getElementById('msg-input').addEventListener('input',()=>{
  if(!isTy){isTy=true;socket.emit('typing',{isTyping:true,toSocketId:currentMode==='dm'?currentDmUser:null})}
  clearTimeout(tyTimer);tyTimer=setTimeout(clearTypingSignal,2000);
});
function clearTypingSignal(){if(isTy){isTy=false;socket.emit('typing',{isTyping:false,toSocketId:currentMode==='dm'?currentDmUser:null})}}

// Image picker
document.getElementById('img-file').addEventListener('change',e=>{
  const file=e.target.files[0];if(!file)return;
  if(file.size>8*1024*1024){toast('Image too large (max 8MB)');return}
  const reader=new FileReader();
  reader.onload=ev=>{
    pendingImageData=ev.target.result;
    const preview=document.getElementById('img-preview');
    document.getElementById('img-preview-thumb').src=ev.target.result;
    preview.classList.add('show');
    document.getElementById('img-caption').value='';
  };
  reader.readAsDataURL(file);
  e.target.value='';
});

function clearImagePreview(){
  pendingImageData=null;
  document.getElementById('img-preview').classList.remove('show');
  document.getElementById('img-preview-thumb').src='';
}

// Location
function shareLocation(){
  if(!navigator.geolocation){toast('Geolocation not supported');return}
  toast('Getting location…');
  navigator.geolocation.getCurrentPosition(pos=>{
    const {latitude,longitude}=pos.coords;
    if(currentMode==='dm'&&currentDmUser){
      socket.emit('private-location',{latitude,longitude,toSocketId:currentDmUser});
    } else {
      socket.emit('share-location',{latitude,longitude});
    }
    toast('Location shared!');
  },err=>toast('Location error: '+err.message));
}

// Emoji toggle
function toggleEmoji(){
  document.getElementById('emoji-picker').classList.toggle('open');
}
document.addEventListener('click',e=>{
  if(!e.target.closest('#emoji-picker')&&!e.target.closest('#emoji-btn')){
    document.getElementById('emoji-picker').classList.remove('open');
  }
});

/*════════════════════════════════════════════
  REACTIONS
════════════════════════════════════════════*/
let reactionMenu=null;
function showReactionMenu(msgId,x,y){
  if(reactionMenu)reactionMenu.remove();
  const menu=document.createElement('div');
  menu.style.cssText=`position:fixed;left:${x}px;top:${y}px;background:var(--s2);border:1px solid var(--border);border-radius:12px;padding:8px;display:flex;gap:4px;z-index:400;box-shadow:0 8px 24px rgba(0,0,0,.4)`;
  ['❤️','😂','👍','😮','😢','🔥'].forEach(em=>{
    const b=document.createElement('span');
    b.style.cssText='font-size:22px;cursor:pointer;padding:4px;border-radius:6px;transition:background .1s';
    b.textContent=em;
    b.onmouseover=()=>b.style.background='var(--s3)';
    b.onmouseout=()=>b.style.background='';
    b.onclick=()=>{socket.emit('reaction',{msgId,emoji:em});menu.remove();reactionMenu=null};
    menu.appendChild(b);
  });
  document.body.appendChild(menu);
  reactionMenu=menu;
  setTimeout(()=>document.addEventListener('click',()=>{menu.remove();reactionMenu=null},{once:true}),0);
}

/*════════════════════════════════════════════
  PROFILE PANEL
════════════════════════════════════════════*/
function openProfilePanel(socketId){
  if(!socketId)return;
  const user=allUsers[socketId];if(!user)return;
  const body=document.getElementById('pp-body');

  const avHtml=makeAvatar(user,72,'pp-avatar');
  body.innerHTML=`
    ${avHtml}
    <div class="pp-name">${esc(user.displayName)}</div>
    <div class="pp-username">@${esc(user.username)}</div>

    <div class="pp-section">
      <h4>About</h4>
      <div class="pp-row"><span class="icon">💬</span><span class="val">${esc(user.status||'No status')}</span></div>
      ${user.address?`<div class="pp-row"><span class="icon">📍</span><span class="val">${esc(user.address)}</span></div>`:''}
      ${user.phone
        ?`<div class="pp-row"><span class="icon">📞</span><span class="val">${esc(user.phone)}</span></div>`
        :`<div class="pp-row"><span class="icon">📞</span><span class="val hidden-val">Phone hidden</span></div>`
      }
    </div>

    ${socketId!==socket.id?`<button class="dm-btn" onclick="switchToDm('${socketId}');closeProfilePanel()">💬 Send Message</button>`:''}
  `;
  document.getElementById('profile-panel').classList.add('open');
}

function closeProfilePanel(){
  document.getElementById('profile-panel').classList.remove('open');
}

/*════════════════════════════════════════════
  LIGHTBOX
════════════════════════════════════════════*/
function openLightbox(src){
  document.getElementById('lightbox-img').src=src;
  openModal('lightbox-modal');
}

/*════════════════════════════════════════════
  MY PROFILE BAR
════════════════════════════════════════════*/
function updateMyBar(){
  if(!me)return;
  const wrap=document.querySelector('.my-av-wrap');
  wrap.outerHTML=`<div class="my-av-wrap">${makeAvatar(me,38,'')}</div>`;
  document.getElementById('my-name-bar').textContent=me.displayName;
  document.getElementById('my-status-bar').textContent=me.status||'';
}

/*════════════════════════════════════════════
  SOCKET EVENTS
════════════════════════════════════════════*/
socket.on('profile-confirmed',profile=>{
  me=profile;
  updateMyBar();
});

socket.on('user-list',list=>{
  allUsers={};
  list.forEach(u=>allUsers[u.socketId]=u);
  renderPeopleList();
  renderDmList();
});

socket.on('user-count',n=>{
  document.getElementById('user-count').textContent=n;
});

socket.on('user-left',sid=>{
  delete allUsers[sid];
  renderPeopleList();
  renderDmList();
  if(currentDmUser===sid){
    document.getElementById('topbar-sub').textContent='User went offline';
  }
});

socket.on('system-message',({text,time})=>{
  const msg={type:'system',text,time,id:'sys-'+Date.now()};
  globalMessages.push(msg);
  if(currentMode==='global') appendMsgEl(msg,'global');
});

socket.on('chat-message',msg=>{
  globalMessages.push(msg);
  if(currentMode==='global') appendMsgEl(msg,'global');
});

socket.on('private-message',msg=>{
  const otherId=msg.fromSocketId===socket.id?msg.toSocketId:msg.fromSocketId;
  if(!dmHistory[otherId])dmHistory[otherId]=[];
  dmHistory[otherId].push(msg);

  if(currentMode==='dm'&&currentDmUser===otherId){
    appendMsgEl(msg,'dm');
  } else if(msg.fromSocketId!==socket.id){
    unreadDms[otherId]=(unreadDms[otherId]||0)+1;
    toast(`💬 New message from ${msg.displayName}`);
  }
  renderPeopleList();
  renderDmList();
});

socket.on('typing',({displayName,isTyping,fromSocketId})=>{
  if(fromSocketId===null){
    // global
    if(isTyping) globalTypers[displayName]=true; else delete globalTypers[displayName];
    if(currentMode==='global') updateTypingBar(globalTypers);
  } else {
    // dm
    if(currentMode==='dm'&&currentDmUser===fromSocketId){
      if(isTyping) dmTypers[displayName]=true; else delete dmTypers[displayName];
      updateTypingBar(dmTypers);
    }
  }
});

socket.on('reaction',({msgId,emoji,from})=>{
  const container=document.getElementById('reactions-'+msgId);
  if(!container)return;
  // find or create chip
  let chip=[...container.querySelectorAll('.reaction-chip')].find(c=>c.dataset.emoji===emoji);
  if(!chip){
    chip=document.createElement('span');
    chip.className='reaction-chip';
    chip.dataset.emoji=emoji;
    chip.dataset.count=0;
    container.appendChild(chip);
  }
  chip.dataset.count=parseInt(chip.dataset.count)+1;
  chip.textContent=emoji+(chip.dataset.count>1?' '+chip.dataset.count:'');
});

function updateTypingBar(typers){
  const names=Object.keys(typers);
  const bar=document.getElementById('typing-bar');
  if(!names.length){bar.innerHTML='';return}
  const label=names.length===1?`${names[0]} is typing`:`${names.slice(0,-1).join(', ')} & ${names.slice(-1)} are typing`;
  bar.innerHTML=`${label} <span class="t-dots"><span></span><span></span><span></span></span>`;
}
</script>
